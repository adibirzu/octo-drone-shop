name: security-gates

on:
  pull_request:
    paths:
      - 'server/**'
      - 'deploy/**'
      - 'requirements*.txt'
      - 'package*.json'
      - '.github/workflows/security-gates.yml'
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  python-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit semgrep ruff
      - name: Bandit (Python SAST)
        run: bandit -q -r server -x server/__pycache__ -ll -iii
      - name: pip-audit (deps)
        run: pip-audit -r requirements.txt --strict || true
      - name: Ruff security rules
        run: ruff check --select S server
      - name: Semgrep OWASP
        run: semgrep ci --config p/owasp-top-ten --config p/python --config p/fastapi --error --quiet

  node-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: npm audit --omit=dev --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - name: terraform fmt
        run: terraform -chdir=deploy/terraform fmt -check -recursive
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --init
      - run: tflint --chdir=deploy/terraform --recursive

  container-scan:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('Dockerfile') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
