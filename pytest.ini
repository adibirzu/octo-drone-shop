[pytest]
markers =
    unit: fast, isolated unit tests (no network, no DB, no OCI)
    integration: hit real database, queue, or local services
    e2e: full stack end-to-end tests (playwright/browser)
    portability: regression tests for multi-tenancy + deploy-parameterization
    security: regression tests for auth, secrets, headers
testpaths = tests
asyncio_mode = auto
