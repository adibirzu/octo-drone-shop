# Alembic baseline for the shop schema (KG-022).
# Run:
#   alembic -c shop/alembic.ini upgrade head
#
# Online migrations are applied against DATABASE_SYNC_URL (set in env
# by deploy/k8s/shop/deployment.yaml via the octo-atp Secret).

[alembic]
script_location = migrations
prepend_sys_path = ../
version_path_separator = os
output_encoding = utf-8

# Version number file format
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
