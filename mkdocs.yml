  - Introduction: introduction.md
  - Getting Started:
    - getting-started/index.md
    - Prerequisites: getting-started/prerequisites.md
    - Quick Start: getting-started/quickstart.md
    - Deployment options: getting-started/deployment-options.md
    - Bill of Materials: getting-started/bill-of-materials.md
    - OKE Deployment: getting-started/oke-deployment.md
    - New Tenancy: getting-started/new-tenancy.md
  - Architecture:
    - architecture/index.md
    - Platform Overview: architecture/platform-overview.md
    - System Design: architecture/system-design.md
    - Data Model: architecture/data-model.md
    - Database Integration: architecture/database-integration.md
    - Framework Approach: architecture/framework.md
  - Drone Shop:
