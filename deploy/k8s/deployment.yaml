apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-drone-shop
  namespace: octo-drone-shop
  labels:
    app: octo-drone-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: octo-drone-shop
  template:
    metadata:
      labels:
        app: octo-drone-shop
    spec:
      containers:
        - name: app
          image: ${OCIR_REPO}/octo-drone-shop:latest
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: "octo-drone-shop"
            - name: OTEL_SERVICE_NAME
              value: "octo-drone-shop-oke"
            - name: APP_RUNTIME
              value: "oke"
            - name: ENVIRONMENT
              value: "production"
            - name: AUTH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: octo-auth
                  key: token-secret
                  optional: true
            - name: OCI_AUTH_MODE
              value: "resource_principal"
            - name: ORACLE_DSN
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: dsn
            - name: ORACLE_USER
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: username
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: password
            - name: ORACLE_WALLET_DIR
              value: "/opt/oracle/wallet"
            - name: ORACLE_WALLET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: wallet-password
            - name: OCI_APM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: endpoint
                  optional: true
            - name: OCI_APM_PRIVATE_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: private-key
                  optional: true
            - name: OCI_APM_PUBLIC_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: public-key
                  optional: true
            - name: OCI_APM_RUM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: rum-endpoint
                  optional: true
            - name: OCI_APM_WEB_APPLICATION
              value: "octo-drone-shop-web"
            - name: OCI_LOG_ID
              valueFrom:
                secretKeyRef:
                  name: octo-logging
                  key: log-id
                  optional: true
            - name: OCI_LOG_GROUP_ID
              valueFrom:
                secretKeyRef:
                  name: octo-logging
                  key: log-group-id
                  optional: true
            - name: SPLUNK_HEC_URL
              valueFrom:
                secretKeyRef:
                  name: octo-logging
                  key: splunk-hec-url
                  optional: true
            - name: SPLUNK_HEC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: octo-logging
                  key: splunk-hec-token
                  optional: true
            - name: OCI_COMPARTMENT_ID
              valueFrom:
                secretKeyRef:
                  name: octo-genai
                  key: compartment-id
                  optional: true
            - name: OCI_GENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-genai
                  key: endpoint
                  optional: true
            - name: OCI_GENAI_MODEL_ID
              valueFrom:
                secretKeyRef:
                  name: octo-genai
                  key: model-id
                  optional: true
            - name: ENTERPRISE_CRM_URL
              valueFrom:
                secretKeyRef:
                  name: octo-integrations
                  key: crm-url
                  optional: true
          volumeMounts:
            - name: atp-wallet
              mountPath: /opt/oracle/wallet
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 12
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 18
            periodSeconds: 12
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      imagePullSecrets:
        - name: ocir-pull-secret
      volumes:
        - name: atp-wallet
          secret:
            secretName: octo-atp-wallet
---
apiVersion: v1
kind: Service
metadata:
  name: octo-drone-shop
  namespace: octo-drone-shop
  labels:
    app: octo-drone-shop
  annotations:
    oci.oraclecloud.com/load-balancer-type: "lb"
    service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "10"
    service.beta.kubernetes.io/oci-load-balancer-subnet1: "ocid1.subnet.oc1.eu-frankfurt-1.aaaaaaaa4q6hvwazrbtktsqu57lyjpvggze26hubs566v7zy4eclmjh7x2hq"
    oci.oraclecloud.com/oci-load-balancer-health-check-interval: "10000"
    oci.oraclecloud.com/oci-load-balancer-health-check-retries: "3"
    oci.oraclecloud.com/oci-load-balancer-health-check-timeout: "3000"
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: octo-drone-shop
