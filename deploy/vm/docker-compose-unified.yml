# Unified single-VM deployment: Drone Shop + Enterprise CRM Portal
# backed by an OCI Autonomous Database (ATP).
#
# This is the alternative to the OKE deployment path for demos,
# workshops, or air-gapped installs where Kubernetes is too much.
# The same container images are used — OCIR pulls ensure the VM runs
# bit-for-bit identical code to the OKE rollout.

version: "3.9"

networks:
  octo:
    driver: bridge

services:
  shop:
    image: ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/octo-drone-shop:${SHOP_IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - octo
    environment:
      APP_NAME: octo-drone-shop
      APP_RUNTIME: vm
      ENVIRONMENT: ${ENVIRONMENT:-production}
      PORT: "8080"
      DNS_DOMAIN: ${DNS_DOMAIN}
      # Cross-service on loopback — both containers share the internal
      # bridge network.
      SERVICE_CRM_URL: http://crm:8080
      CRM_PUBLIC_URL: https://crm.${DNS_DOMAIN}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      # Oracle ATP via wallet mount
      ORACLE_DSN: ${ORACLE_DSN}
      ORACLE_USER: ${ORACLE_USER:-ADMIN}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      ORACLE_WALLET_DIR: /opt/oracle/wallet
      ORACLE_WALLET_PASSWORD: ${ORACLE_WALLET_PASSWORD}
      # OCI observability — optional
      OCI_AUTH_MODE: ${OCI_AUTH_MODE:-instance_principal}
      OCI_COMPARTMENT_ID: ${OCI_COMPARTMENT_ID}
      OCI_APM_ENDPOINT: ${OCI_APM_ENDPOINT}
      OCI_APM_PRIVATE_DATAKEY: ${OCI_APM_PRIVATE_DATAKEY}
      OCI_APM_PUBLIC_DATAKEY: ${OCI_APM_PUBLIC_DATAKEY}
      OCI_APM_RUM_ENDPOINT: ${OCI_APM_RUM_ENDPOINT}
      OCI_APM_WEB_APPLICATION: ${OCI_APM_WEB_APPLICATION:-octo-drone-shop-web}
      OCI_LOG_ID: ${OCI_LOG_ID}
      OCI_LOG_GROUP_ID: ${OCI_LOG_GROUP_ID}
      IDCS_DOMAIN_URL: ${IDCS_DOMAIN_URL}
      IDCS_CLIENT_ID: ${IDCS_CLIENT_ID}
      IDCS_CLIENT_SECRET: ${IDCS_CLIENT_SECRET}
    volumes:
      - ./wallet:/opt/oracle/wallet:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  crm:
    image: ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/enterprise-crm-portal:${CRM_IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - octo
    environment:
      APP_NAME: enterprise-crm-portal
      APP_RUNTIME: vm
      APP_ENV: ${ENVIRONMENT:-production}
      APP_PORT: "8080"
      DNS_DOMAIN: ${DNS_DOMAIN}
      CRM_BASE_URL: https://crm.${DNS_DOMAIN}
      SERVICE_SHOP_URL: http://shop:8080
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      ORACLE_DSN: ${ORACLE_DSN}
      ORACLE_USER: ${ORACLE_USER:-ADMIN}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      ORACLE_WALLET_DIR: /opt/oracle/wallet
      ORACLE_WALLET_PASSWORD: ${ORACLE_WALLET_PASSWORD}
      OCI_AUTH_MODE: ${OCI_AUTH_MODE:-instance_principal}
      OCI_APM_ENDPOINT: ${OCI_APM_ENDPOINT}
      OCI_APM_PRIVATE_DATAKEY: ${OCI_APM_PRIVATE_DATAKEY}
      OCI_APM_RUM_ENDPOINT: ${OCI_APM_RUM_ENDPOINT}
      OCI_APM_RUM_PUBLIC_DATAKEY: ${OCI_APM_PUBLIC_DATAKEY}
      OCI_LOG_ID: ${OCI_LOG_ID}
      OCI_LOG_GROUP_ID: ${OCI_LOG_GROUP_ID}
    volumes:
      - ./wallet:/opt/oracle/wallet:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - octo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/tls:/etc/nginx/tls:ro
    depends_on:
      shop:
        condition: service_healthy
      crm:
        condition: service_healthy
