user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    # Real-IP + correlation passthrough
    log_format octo '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'x-request-id=$http_x_request_id';
    access_log /var/log/nginx/access.log octo;

    client_max_body_size 16m;

    # ── Redirect bare HTTP → HTTPS when TLS is present ─────────────
    server {
        listen 80 default_server;
        server_name _;
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Shop storefront ────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name shop.${DNS_DOMAIN};

        ssl_certificate     /etc/nginx/tls/shop/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/shop/privkey.pem;

        location / {
            proxy_pass          http://shop:8080;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    X-Request-Id      $http_x_request_id;
            proxy_read_timeout  60s;
        }
    }

    # ── Enterprise CRM ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name crm.${DNS_DOMAIN};

        ssl_certificate     /etc/nginx/tls/crm/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/crm/privkey.pem;

        location / {
            proxy_pass          http://crm:8080;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    X-Request-Id      $http_x_request_id;
            proxy_read_timeout  60s;
        }
    }
}
