<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b4f8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="octoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5c23d4;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield background -->
  <path d="M100 10 L175 40 L175 100 C175 145 140 170 100 185 C60 170 25 145 25 100 L25 40 Z"
        fill="url(#shieldGrad)" stroke="#0d47a1" stroke-width="2" opacity="0.9"/>
  <path d="M100 18 L168 44 L168 100 C168 140 136 163 100 177 C64 163 32 140 32 100 L32 44 Z"
        fill="#1565c0" stroke="none" opacity="0.3"/>

  <!-- Octopus head (dome) -->
  <ellipse cx="100" cy="72" rx="42" ry="38" fill="url(#octoGrad)" filter="url(#glow)"/>
  <ellipse cx="100" cy="72" rx="36" ry="32" fill="#9c27b0" opacity="0.4"/>

  <!-- Brain pattern on head -->
  <path d="M78 62 Q85 55 92 62 Q99 55 106 62 Q113 55 120 62"
        fill="none" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M82 72 Q90 65 98 72 Q106 65 114 72"
        fill="none" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M86 82 Q94 75 102 82 Q110 75 118 82"
        fill="none" stroke="url(#brainGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="86" cy="70" rx="8" ry="9" fill="#ffffff"/>
  <ellipse cx="114" cy="70" rx="8" ry="9" fill="#ffffff"/>
  <circle cx="88" cy="69" r="4" fill="#1a237e"/>
  <circle cx="116" cy="69" r="4" fill="#1a237e"/>
  <circle cx="89.5" cy="67.5" r="1.5" fill="#ffffff"/>
  <circle cx="117.5" cy="67.5" r="1.5" fill="#ffffff"/>

  <!-- Tentacles (8 total, curving outward) -->
  <!-- Left tentacles -->
  <path d="M68 95 Q45 110 35 135 Q30 148 38 152" fill="none" stroke="#7c4dff" stroke-width="5" stroke-linecap="round"/>
  <path d="M62 100 Q50 125 55 150 Q58 162 65 158" fill="none" stroke="#9c27b0" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M72 102 Q62 130 68 155 Q72 168 78 162" fill="none" stroke="#7c4dff" stroke-width="4" stroke-linecap="round"/>
  <path d="M80 105 Q75 130 78 148 Q80 158 86 155" fill="none" stroke="#9c27b0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right tentacles -->
  <path d="M132 95 Q155 110 165 135 Q170 148 162 152" fill="none" stroke="#7c4dff" stroke-width="5" stroke-linecap="round"/>
  <path d="M138 100 Q150 125 145 150 Q142 162 135 158" fill="none" stroke="#9c27b0" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M128 102 Q138 130 132 155 Q128 168 122 162" fill="none" stroke="#7c4dff" stroke-width="4" stroke-linecap="round"/>
  <path d="M120 105 Q125 130 122 148 Q120 158 114 155" fill="none" stroke="#9c27b0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Suction cups on outer tentacles -->
  <circle cx="36" cy="148" r="3" fill="#b388ff" opacity="0.7"/>
  <circle cx="42" cy="138" r="2.5" fill="#b388ff" opacity="0.5"/>
  <circle cx="164" cy="148" r="3" fill="#b388ff" opacity="0.7"/>
  <circle cx="158" cy="138" r="2.5" fill="#b388ff" opacity="0.5"/>

  <!-- Shield lock/security icon on chest -->
  <rect x="93" y="90" width="14" height="10" rx="2" fill="#ffd600" opacity="0.9"/>
  <path d="M96 90 L96 86 Q96 82 100 82 Q104 82 104 86 L104 90"
        fill="none" stroke="#ffd600" stroke-width="2" opacity="0.9"/>

  <!-- App name -->
  <text x="100" y="205" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="16" font-weight="700" fill="#ffffff" letter-spacing="1">OCTO-CRM-APM</text>
</svg>
