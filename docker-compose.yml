services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env.local
      - deploy/credentials.env
    environment:
      - APP_NAME=${APP_NAME:-octo-drone-shop}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-octo-drone-shop}
      - APP_RUNTIME=${APP_RUNTIME:-docker}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PORT=${PORT:-8080}
      - OCI_AUTH_MODE=${OCI_AUTH_MODE:-auto}
      - AUTH_TOKEN_SECRET=${AUTH_TOKEN_SECRET:-}
      - SEED_USER_EMAIL_DOMAIN=${SEED_USER_EMAIL_DOMAIN:-example.invalid}
      - SEED_PAGEVIEW_IP_PREFIX=${SEED_PAGEVIEW_IP_PREFIX:-198.18.0.}
      - ORACLE_DSN=${ORACLE_DSN:-}
      - ORACLE_USER=${ORACLE_USER:-ADMIN}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:-}
      - ORACLE_WALLET_DIR=/opt/oracle/wallet
      - ORACLE_WALLET_PASSWORD=${ORACLE_WALLET_PASSWORD:-}
      - ENTERPRISE_CRM_URL=${ENTERPRISE_CRM_URL:-}
      - CRM_PUBLIC_URL=${CRM_PUBLIC_URL:-https://crm.example.cloud}
      - OCI_COMPARTMENT_ID=${OCI_COMPARTMENT_ID:-}
      - OCI_GENAI_ENDPOINT=${OCI_GENAI_ENDPOINT:-}
      - OCI_GENAI_MODEL_ID=${OCI_GENAI_MODEL_ID:-}
      - WORKFLOW_API_BASE_URL=${WORKFLOW_API_BASE_URL:-http://localhost:8090}
      - WORKFLOW_PUBLIC_API_BASE_URL=${WORKFLOW_PUBLIC_API_BASE_URL:-}
      - WORKFLOW_SERVICE_NAME=${WORKFLOW_SERVICE_NAME:-octo-workflow-gateway}
      - SELECTAI_PROFILE_NAME=${SELECTAI_PROFILE_NAME:-}
      - OCI_APM_ENDPOINT=${OCI_APM_ENDPOINT:-}
      - OCI_APM_PRIVATE_DATAKEY=${OCI_APM_PRIVATE_DATAKEY:-}
      - OCI_APM_PUBLIC_DATAKEY=${OCI_APM_PUBLIC_DATAKEY:-}
      - OCI_APM_RUM_ENDPOINT=${OCI_APM_RUM_ENDPOINT:-}
      - OCI_APM_WEB_APPLICATION=${OCI_APM_WEB_APPLICATION:-octo-drone-shop-web}
      - OCI_LOG_ID=${OCI_LOG_ID:-}
      - OCI_LOG_GROUP_ID=${OCI_LOG_GROUP_ID:-}
      - SPLUNK_HEC_URL=${SPLUNK_HEC_URL:-}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN:-}
    volumes:
      - ${ORACLE_WALLET_PATH:-./wallet}:/opt/oracle/wallet:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  workflow-gateway:
    build:
      context: ./services/workflow-gateway
    ports:
      - "8090:8090"
    env_file:
      - .env.local
      - deploy/credentials.env
    environment:
      - WORKFLOW_APP_NAME=${WORKFLOW_SERVICE_NAME:-octo-workflow-gateway}
      - WORKFLOW_SERVICE_NAME=${WORKFLOW_SERVICE_NAME:-octo-workflow-gateway}
      - WORKFLOW_PORT=8090
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - ORACLE_DSN=${ORACLE_DSN:-}
      - ORACLE_USER=${ORACLE_USER:-ADMIN}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:-}
      - ORACLE_WALLET_DIR=/opt/oracle/wallet
      - ORACLE_WALLET_PASSWORD=${ORACLE_WALLET_PASSWORD:-}
      - ENTERPRISE_CRM_URL=${ENTERPRISE_CRM_URL:-}
      - OCI_APM_ENDPOINT=${OCI_APM_ENDPOINT:-}
      - OCI_APM_PRIVATE_DATAKEY=${OCI_APM_PRIVATE_DATAKEY:-}
      - WORKFLOW_POLL_SECONDS=${WORKFLOW_POLL_SECONDS:-90}
      - WORKFLOW_ALLOWED_ORIGINS=${WORKFLOW_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      - WORKFLOW_FAULTY_QUERY_ENABLED=${WORKFLOW_FAULTY_QUERY_ENABLED:-false}
      - SELECTAI_PROFILE_NAME=${SELECTAI_PROFILE_NAME:-}
    volumes:
      - ${ORACLE_WALLET_PATH:-./wallet}:/opt/oracle/wallet:ro
    restart: unless-stopped
