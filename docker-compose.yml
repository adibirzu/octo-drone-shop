services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://octocrm:octocrm@postgres:5432/octocrm
      - DATABASE_SYNC_URL=postgresql://octocrm:octocrm@postgres:5432/octocrm
      - APP_NAME=octo-drone-shop
      - APP_RUNTIME=docker
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: octocrm
      POSTGRES_USER: octocrm
      POSTGRES_PASSWORD: octocrm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octocrm -d octocrm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
