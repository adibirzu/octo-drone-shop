services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_NAME=${APP_NAME:-enterprise-crm-portal}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-enterprise-crm-portal-oke}
      - APP_RUNTIME=${APP_RUNTIME:-oke}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ORACLE_DSN=${ORACLE_DSN}
      - ORACLE_USER=${ORACLE_USER:-ADMIN}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_WALLET_DIR=/opt/oracle/wallet
      - ORACLE_WALLET_PASSWORD=${ORACLE_WALLET_PASSWORD}
      - ENTERPRISE_CRM_URL=${ENTERPRISE_CRM_URL:-}
      - OCI_APM_ENDPOINT=${OCI_APM_ENDPOINT:-}
      - OCI_APM_PRIVATE_DATAKEY=${OCI_APM_PRIVATE_DATAKEY:-}
      - OCI_APM_PUBLIC_DATAKEY=${OCI_APM_PUBLIC_DATAKEY:-}
      - OCI_APM_RUM_ENDPOINT=${OCI_APM_RUM_ENDPOINT:-}
      - OCI_APM_WEB_APPLICATION=${OCI_APM_WEB_APPLICATION:-enterprise-crm-portal-web}
    volumes:
      - ${ORACLE_WALLET_PATH:-./wallet}:/opt/oracle/wallet:ro
    restart: unless-stopped
